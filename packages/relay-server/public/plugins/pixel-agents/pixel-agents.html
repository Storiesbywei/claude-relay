<!-- ============ PIXEL AGENTS (OFFICE VIEW) ============ -->
<main class="pixel-view" id="pixel-view" style="display:none">
  <div class="pixel-canvas-container" id="pixel-canvas-container"></div>
  <aside class="pixel-sidebar" id="pixel-sidebar">
    <div class="pixel-sidebar-header">
      <span class="sidebar-title">Agents</span>
    </div>
    <div class="pixel-agent-list" id="pixel-agent-list">
      <div class="file-tree-empty">No agents yet.<br>Start a session to see agents appear.</div>
    </div>
    <div class="pixel-sidebar-actions">
      <button class="btn btn-ghost btn-sm" id="btn-spawn-test" title="Spawn a test agent">+ Agent</button>
      <button class="btn btn-ghost btn-sm" id="btn-spawn-task" title="Spawn a task knight" style="color: var(--red)">+ Task</button>
      <button class="btn btn-ghost btn-sm" id="btn-resolve-task" title="Resolve last task" style="color: var(--green)">Resolve</button>
    </div>
  </aside>
</main>
